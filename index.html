<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cookies Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="container flex-sb">
            <div class="logo">ROBLOX <span>COOKIES</span></div>
            <a href="https://t.me/your_bot" class="btn">ТЕЛЕГРАМ</a>
        </div>
    </header>

    <div class="container">
        <section class="hero-box">
            <h1>Магазин лучших Cookies</h1>
            <p>Надежно. Быстро. Дешево.</p>
            <div class="stock-info">В наличии: <span id="count">48,250</span> шт.</div>
        </section>

        <section class="main-card">
            <h3>Проверить аккаунт</h3>
            <div class="search-bar">
                <input type="text" id="nick" placeholder="Ваш ник...">
                <button onclick="runCheck()" class="btn">ТЕСТ</button>
            </div>
            <p id="out"></p>
        </section>

        <div class="price-row">
            <div class="p-card">
                <h4>500 шт.</h4>
                <div class="price">99 ₽</div>
                <a href="#" class="btn-small">КУПИТЬ</a>
            </div>
            <div class="p-card hot">
                <div class="label">ХИТ</div>
                <h4>2,500 шт.</h4>
                <div class="price">450 ₽</div>
                <a href="#" class="btn-small">КУПИТЬ</a>
            </div>
            <div class="p-card">
                <h4>10,000 шт.</h4>
                <div class="price">1,600 ₽</div>
                <a href="#" class="btn-small">КУПИТЬ</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
