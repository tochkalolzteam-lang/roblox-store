<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cookies Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-flex">
            <div class="logo">Roblox <span>Cookies</span></div>
            <a href="https://t.me/your_bot" class="btn-buy">В магазин (TG)</a>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Лучшие Cookies для вашего аккаунта</h1>
            <p>Быстро, безопасно и выгодно.</p>
            <div class="stock-status">В наличии: <strong id="cookie-count">48,250</strong> шт.</div>
        </section>

        <section class="checker-section">
            <div class="check-box">
                <h3>Проверка на совместимость</h3>
                <div class="input-group">
                    <input type="text" id="nickname" placeholder="Ваш ник">
                    <button onclick="checkAccount()" class="btn-buy">Проверить</button>
                </div>
                <div id="check-result"></div>
            </div>
        </section>

        <section class="price-grid">
            <div class="price-item">
                <h4>Новичок</h4>
                <div class="price-val">500 шт.</div>
                <div class="price-cost">99 ₽</div>
                <a href="#" class="btn-buy">Купить</a>
            </div>
            <div class="price-item featured">
                <div class="badge">ТОП</div>
                <h4>Геймер</h4>
                <div class="price-val">2,500 шт.</div>
                <div class="price-cost">450 ₽</div>
                <a href="#" class="btn-buy">Купить</a>
            </div>
            <div class="price-item">
                <h4>Магнат</h4>
                <div class="price-val">10,000 шт.</div>
                <div class="price-cost">1,600 ₽</div>
                <a href="#" class="btn-buy">Купить</a>
            </div>
        </section>
    </main>

    <div id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>
