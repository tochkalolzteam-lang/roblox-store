<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cookies Store</title>
    <style>
        /* СТИЛИ ПРЯМО ТУТ - ТЕПЕРЬ ОНИ ТОЧНО ЗАРАБОТАЮТ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #050510; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6;
            text-align: center;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        header { background: #0a0a1f; padding: 20px 0; border-bottom: 2px solid #00d2ff; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 1px; }
        .logo span { color: #00d2ff; }

        .hero h1 { font-size: 32px; margin-bottom: 10px; }
        .stock { 
            display: inline-block; background: rgba(0, 255, 136, 0.1); 
            border: 1px solid #00ff88; padding: 5px 15px; 
            border-radius: 20px; color: #00ff88; font-size: 14px; margin: 15px 0;
        }

        .card { 
            background: #11112b; border: 1px solid #222; 
            border-radius: 15px; padding: 30px; margin: 20px 0; 
        }
        
        .input-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        input { 
            padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: #050510; color: white; width: 60%; outline: none;
        }
        input:focus { border-color: #00d2ff; }

        .btn { 
            background: #00d2ff; color: #000; padding: 12px 25px; 
            border-radius: 8px; font-weight: bold; text-decoration: none; 
            display: inline-block; border: none; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #fff; transform: translateY(-2px); }

        .price-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; margin-top: 40px; 
        }
        .price-item { 
            background: #11112b; padding: 25px; border-radius: 15px; 
            border: 1px solid #222; transition: 0.3s; position: relative;
        }
        .price-item.hot { border-color: #00d2ff; transform: scale(1.05); }
        .hot-label { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: #00d2ff; color: #000; padding: 2px 12px; 
            border-radius: 10px; font-size: 12px; font-weight: bold;
        }

        .price-item h4 { font-size: 22px; margin-bottom: 10px; }
        .cost { font-size: 24px; color: #00d2ff; font-weight: bold; margin-bottom: 20px; }
        
        #result { margin-top: 15px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">ROBLOX <span>COOKIES</span></div>
        </div>
    </header>

    <div class="container">
        <section class="hero">
            <h1>Магазин лучших Cookies</h1>
            <p>Автоматическая выдача и полная безопасность</p>
            <div class="stock">В наличии: 48,250 шт.</div>
        </section>

        <section class="card">
            <h3>Проверка аккаунта</h3>
            <div class="input-group">
                <input type="text" id="nick" placeholder="Введите ваш ник...">
                <button onclick="check()" class="btn">ТЕСТ</button>
            </div>
            <div id="result"></div>
        </section>

        <div class="price-grid">
            <div class="price-item">
                <h4>500 шт.</h4>
                <div class="cost">99 ₽</div>
                <a href="https://t.me/your_bot" class="btn">КУПИТЬ</a>
            </div>
            <div class="price-item hot">
                <div class="hot-label">ХИТ</div>
                <h4>2,500 шт.</h4>
                <div class="cost">450 ₽</div>
                <a href="https://t.me/your_bot" class="btn">КУПИТЬ</a>
            </div>
            <div class="price-item">
                <h4>10,000 шт.</h4>
                <div class="cost">1,600 ₽</div>
                <a href="https://t.me/your_bot" class="btn">КУПИТЬ</a>
            </div>
        </div>
    </div>

    <script>
        // СКРИПТЫ ТОЖЕ ТУТ
        function check() {
            const nick = document.getElementById('nick').value;
            const res = document.getElementById('result');
            if(!nick.trim()) {
                res.innerText = "❌ Введите ник!";
                res.style.color = "#ff4d4d";
                return;
            }
            res.style.color = "#00d2ff";
            res.innerText = "🔍 Проверка совместимости...";
            setTimeout(() => {
                res.innerText = "✅ Аккаунт " + nick + " совместим!";
                res.style.color = "#00ff88";
            }, 1200);
        }
    </script>
</body>
</html>
